name: Deploy backend to Hugging Face Space

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare deploy directory
        run: |
          set -e
          DEPLOY_DIR=deploy_backend
          rm -rf "$DEPLOY_DIR"
          mkdir "$DEPLOY_DIR"
          cp -R backend/. "$DEPLOY_DIR/"
          cd "$DEPLOY_DIR"
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy backend to Hugging Face Space: ${{ github.sha }}"

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO }}
        run: |
          set -e
          DEPLOY_DIR=deploy_backend
          cd "$DEPLOY_DIR"
          # Use the token to authenticate and push the backend contents to the Space repo
          git remote add origin https://${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_REPO}.git
          git push -f origin main

      - name: Cleanup
        if: always()
        run: |
          rm -rf deploy_backend

# Notes:
# - Requires repository secrets `HF_TOKEN` (Hugging Face token) and `HF_SPACE_REPO` (owner/space-name).
# - This workflow force-pushes the `backend/` contents to the Space repository's `main` branch.